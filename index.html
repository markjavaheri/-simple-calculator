<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🧮 Simple Calculator</h1>
        <p class="subtitle">Add and Subtract Numbers</p>
        
        <div class="calculator">
            <div class="input-group">
                <label for="number1">First Number:</label>
                <input type="number" id="number1" placeholder="Enter first number" value="0">
            </div>
            
            <div class="input-group">
                <label for="number2">Second Number:</label>
                <input type="number" id="number2" placeholder="Enter second number" value="0">
            </div>
            
            <div class="button-group">
                <button id="addBtn" class="btn btn-add">➕ Add</button>
                <button id="subtractBtn" class="btn btn-subtract">➖ Subtract</button>
                <button id="multiplyBtn" class="btn btn-multiply">✖️ Multiply</button>
            </div>
            
            <div class="result-container">
                <h2>Result:</h2>
                <div id="result" class="result">0</div>
            </div>
            
            <div class="history-container">
                <h3>Recent Calculations:</h3>
                <ul id="history" class="history-list"></ul>
                <button id="clearHistory" class="btn btn-clear">Clear History</button>
            </div>
        </div>
        
        <div class="info">
            <p>👥 <strong>Collaborating?</strong> Check out our <a href="BEGINNER_GUIDE.md">Beginner's Guide</a></p>
        </div>
    </div>
    
    <script src="calculator.js"></script>
</body>
</html>
